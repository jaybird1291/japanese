<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Meta viewport pour un bon rendu mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heatmap avec animation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      margin: 0;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(15px, 1fr));
      grid-gap: 5px;
      margin-top: 20px;
      padding: 10px;
      overflow-x: auto;    /* permet le défilement horizontal */
      width: 100%;
      touch-action: pan-x; /* sur mobile, évite les conflits de scroll */
    }

    .stats {
      margin-top: 20px;
      text-align: center;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .day {
      width: 15px;
      height: 15px;
      background-color: #3b3b3b;
      border-radius: 2px;
      position: relative;
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
      /* On met une transition pour que l’agrandissement soit animé */
    }

    /* Quand un carré est "sélectionné" ou "survolé", on l'agrandit un peu + ombre */
    .day.hovered {
      transform: scale(1.25);
      z-index: 10;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
    }

    /* Indication visuelle quand il y a des cartes (mainly for cursor) */
    .day[data-cards] {
      cursor: pointer;
    }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background-color: #333;
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 1000;
      max-width: 200px;
      /* On peut limiter la largeur pour éviter un tooltip trop large sur mobile */
      line-height: 1.4;
    }

    .tooltip[style*="visibility: visible"] {
      display: block;
    }

    /* Couleurs (thème magenta) */
    .q1  { background-color: #49006a; }
    .q2  { background-color: #610070; }
    .q3  { background-color: #7a0177; }
    .q4  { background-color: #ae017e; }
    .q5  { background-color: #dd3497; }
    .q6  { background-color: #ea4e9c; }
    .q7  { background-color: #f768a1; }
    .q8  { background-color: #fa9fb5; }
    .q9  { background-color: #fcc5c0; }
    .q10 { background-color: #fde0dd; }

    /* Responsive Adjustments */
    @media (max-width: 768px) {
      .grid-container {
        grid-gap: 7px; /* Reduced gap for medium screens */
      }
      .day {
        width: 18px;
        height: 18px;
      }
      .stats {
        font-size: 14px;
        gap: 10px;
      }
    }
    /* @media (max-width: 480px) {
      .grid-container {
        grid-template-columns: repeat(auto-fill, minmax(10px, 1fr));

      .day {

        font-size: 12px;
        gap: 5px;
      }
    } */ 
  </style>
</head>

    const grid = document.getElementById("grid");

    // Retourne la classe correspondant au nombre de cartes
    function getClassByCards(cards) {
      if (cards >= 168) return "q10";
      if (cards >= 147) return "q9";
      if (cards >= 126) return "q8";
      if (cards >= 105) return "q7";
      if (cards >= 84)  return "q6";
      if (cards >= 63)  return "q5";
      if (cards >= 42)  return "q4";
      if (cards >= 21)  return "q3";
      if (cards >= 1)   return "q2";
      return "q1"; // 0
    }

    function renderGrid() {
      grid.innerHTML = "";
      const today = new Date();
      const totalDays = 369;  // ~1 an
      const endDay = new Date(today);

      let totalCards = 0;
      let longestStreak = 0;
      let currentStreak = 0;
      let tempStreak = 0;

      // Tooltip unique
      const tooltip = document.createElement("div");
      tooltip.className = "tooltip";
      document.body.appendChild(tooltip);

      // Détecte si on est sur un écran tactile
      const isTouchDevice = ('ontouchstart' in window);

      // Fonctions d'affichage / masquage du tooltip
      const showTooltip = (e, message) => {
        const x = e.touches?.[0]?.clientX ?? e.clientX;
        const y = e.touches?.[0]?.clientY ?? e.clientY;

        // Petit formatage du message : exemple, on peut mettre un saut de ligne
        // ou un style, libre à vous
        tooltip.innerHTML = message.replace(" on ", "<br><small>on </small>");

        tooltip.style.visibility = "visible";
        tooltip.style.opacity = "1";

        // Positionnement
        const tooltipWidth = tooltip.offsetWidth;
        const adjustedX = Math.min(x + 10, window.innerWidth - tooltipWidth - 10);
        const adjustedY = Math.max(y - 40, 10);

        tooltip.style.left = `${adjustedX}px`;
        tooltip.style.top = `${adjustedY}px`;
      };

      const hideTooltip = () => {
        tooltip.style.visibility = "hidden";
        tooltip.style.opacity = "0";
      };

      // Pour gérer l'effet agrandi : on déselectionne tous les carrés
      const removeAllHovered = () => {
        const allDays = document.querySelectorAll(".day.hovered");
        allDays.forEach(d => d.classList.remove("hovered"));
      };

      for (let i = totalDays - 1; i >= 1; i--) {
        const d = new Date(endDay);
        d.setDate(endDay.getDate() - i);

        const day = document.createElement("div");
        day.className = "day";

        const dayString = d.toLocaleDateString("en-GB");
        const todayData = data.find(entry => entry.date === dayString) || null;

        if (todayData && todayData.cards > 0) {
          const cards = todayData.cards;
          totalCards += cards;

          tempStreak++;
          if (tempStreak > longestStreak) {
            longestStreak = tempStreak;
          }

          // Couleur en fonction du nombre de cartes
          day.classList.add(getClassByCards(cards));

          if (isTouchDevice) {
            // Sur mobile : un tap => on enlève hovered de tous, on l'ajoute sur ce jour
            day.addEventListener("touchstart", (e) => {
              e.stopPropagation(); // évite que le doc touchestart ferme direct le tooltip
              removeAllHovered();
              day.classList.add("hovered");
              showTooltip(e, `${cards} reviews on ${dayString}`);
            });
          } else {
            // Sur desktop : au survol
            day.addEventListener("mouseover", (e) => {
              removeAllHovered();   // on enlève "hovered" des autres
              day.classList.add("hovered");
              showTooltip(e, `${cards} reviews on ${dayString}`);
            });
            day.addEventListener("mouseout", () => {
              day.classList.remove("hovered");
              hideTooltip();
            });
          }

        } else {
          // 0 cartes => #333
          day.style.backgroundColor = "#333333";
          tempStreak = 0;

          if (isTouchDevice) {
            day.addEventListener("touchstart", (e) => {
              e.stopPropagation();
              removeAllHovered();
              day.classList.add("hovered");
              showTooltip(e, `No reviews on ${dayString}`);
            });
          } else {
            day.addEventListener("mouseover", (e) => {
              removeAllHovered();
              day.classList.add("hovered");
              showTooltip(e, `No reviews on ${dayString}`);
            });
            day.addEventListener("mouseout", () => {
              day.classList.remove("hovered");
              hideTooltip();
            });
          }
        }

        grid.appendChild(day);
      }

      // Streak en cours
      currentStreak = tempStreak;

      // Moyenne journalière
      const daysWithCards = data.filter(d => d.cards > 0).length;
      const dailyAverage = daysWithCards > 0
        ? (totalCards / daysWithCards).toFixed(2)
        : 0;

      document.getElementById("daily-average").innerText = `Daily average: ${dailyAverage} cards`;
      document.getElementById("longest-streak").innerText = `Longest streak: ${longestStreak} days`;
      document.getElementById("current-streak").innerText = `Current streak: ${currentStreak} days`;

      // ---- Fermeture du tooltip et suppression de l’agrandissement ----

      // 1) Sur mobile, si on tape ailleurs que sur le tooltip => fermer tooltip + déselec
      if (isTouchDevice) {
        document.addEventListener("touchstart", (ev) => {
          // Si le tap n’est pas dans le tooltip ni sur un carré .day
          const dayClicked = ev.target.closest(".day");
          if (!tooltip.contains(ev.target) && !dayClicked) {
            hideTooltip();
            removeAllHovered();
          }
        });
      }

      // 2) Lorsqu’on scrolle la page
      window.addEventListener("scroll", () => {
        hideTooltip();
        removeAllHovered();
      }, { passive: true });

      // 3) Si on scrolle horizontalement dans la grille
      grid.addEventListener("scroll", () => {
        hideTooltip();
        removeAllHovered();
      }, { passive: true });
    }

    renderGrid();
  </script>
